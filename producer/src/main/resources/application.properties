spring.application.name=producer

# Suprime el InMemoryUserDetailsManager auto-configurado (y el warning del password)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ─── Database (MySQL) ───────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/producer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# ─── RabbitMQ ───────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# ─── RabbitMQ topology ──────────────────────────────────────────────────────
rabbitmq.exchange=${RABBITMQ_EXCHANGE:producer.exchange}
rabbitmq.routing-key=${RABBITMQ_ROUTING_KEY:producer.messages}
rabbitmq.queue=${RABBITMQ_QUEUE:producer.queue}

# ─── JWT ────────────────────────────────────────────────────────────────────
# Secret must be at least 32 characters (256-bit) for HMAC-SHA256
jwt.secret=${JWT_SECRET:aldeamosSuperSecretKeyForJWT_32CharsMin!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Simple in-memory user for /auth/login ──────────────────────────────────
auth.username=${AUTH_USERNAME:admin}
auth.password=${AUTH_PASSWORD:changeme}
